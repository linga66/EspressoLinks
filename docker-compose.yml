services:
  nginx-lb:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app-1
      - app-2
      - app-3

  app-1:
    build: .
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - DB_PASSWORD=Ashok@0042
      - BASE_URL=http://localhost
    depends_on:
      - postgres
      - redis

  app-2:
    build: .
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - DB_PASSWORD=Ashok@0042
      - BASE_URL=http://localhost
    depends_on:
      - postgres
      - redis

  app-3:
    build: .
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - DB_PASSWORD=Ashok@0042
      - BASE_URL=http://localhost
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ashok@0042
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine